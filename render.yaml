services:
  - type: web
    name: truckpark-api
    runtime: python
    rootDir: truckpark/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 1 -b 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ROOT_ADMIN_NAME
        value: Owner
      - key: ROOT_ADMIN_MOBILE
        sync: false
      - key: ROOT_ADMIN_PASSWORD
        sync: false
      - key: GATEKEEPER_NAME
        value: Gatekeeper
      - key: GATEKEEPER_MOBILE
        sync: false
      - key: GATEKEEPER_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_STATEMENT_CACHE_SIZE
        value: "0"

