services:
  - type: web
    name: truckpark-api
    runtime: python
    rootDir: truckpark/backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "alembic upgrade head && python -m app.db.seed && exec gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 1 -b 0.0.0.0:$PORT --timeout 120"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ROOT_ADMIN_NAME
        value: Owner
      - key: ROOT_ADMIN_MOBILE
        sync: false
      - key: ROOT_ADMIN_PASSWORD
        sync: false
      - key: GATEKEEPER_NAME
        value: Gatekeeper
      - key: GATEKEEPER_MOBILE
        sync: false
      - key: GATEKEEPER_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: '["https://truck-parking-system.vercel.app","https://truck-parking-system-htio.onrender.com","http://localhost:3000"]'
      - key: MSG91_AUTHKEY
        sync: false
      - key: MSG91_SENDER_ID
        value: TRUCKPARKING
      - key: MSG91_WHATSAPP_NUMBER
        value: 917200775876
      - key: MSG91_BASE_URL
        value: https://control.msg91.com/api/v5
      - key: MSG91_ENTRY_TEMPLATE_NAME
        value: truck_entry_notification
      - key: MSG91_EXIT_TEMPLATE_NAME
        value: truck_exit_receipt
      - key: DB_POOL_SIZE
        value: "5"
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_STATEMENT_CACHE_SIZE
        value: "0"

