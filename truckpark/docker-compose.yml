version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truckpark
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truckpark"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/truckpark
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-change_this_to_a_long_secret_in_production}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
      CORS_ORIGIN_REGEX: 'https://.*\.vercel\.app'
      ROOT_ADMIN_MOBILE: ${ROOT_ADMIN_MOBILE:-7200775876}
      ROOT_ADMIN_PASSWORD: ${ROOT_ADMIN_PASSWORD:-0000}
      ROOT_ADMIN_NAME: ${ROOT_ADMIN_NAME:-Owner}
      GATEKEEPER_MOBILE: ${GATEKEEPER_MOBILE:-8888888888}
      GATEKEEPER_PASSWORD: ${GATEKEEPER_PASSWORD:-0000}
      GATEKEEPER_NAME: ${GATEKEEPER_NAME:-Gatekeeper}
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.db.seed &&
        gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --timeout 60
      "

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
